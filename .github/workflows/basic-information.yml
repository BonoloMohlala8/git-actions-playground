on: 
  push:
    branches:
      - main 
      - dev 

  pull_request:
    branches:
      - main

jobs:
  hello_world:
    runs-on: ubuntu-latest
    steps:
      - name: "Echo basic Information"
        run: | 
          echo "REF: $GITHUB_REF"
          echo "Job_ID: $GITHUB_JOB"
          echo "Action: $GITHUB_ACTION"
          echo "ACTOR: $GITHUB_ACTOR"
