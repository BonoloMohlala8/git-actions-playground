# REUSABLE WORKFLOW — this is CALLED by other workflows
# -----------------------------------------------
# WHAT THIS TEACHES: workflow_call trigger, inputs, secrets, outputs
#
# KEY EXAM CONCEPT: this file has `on: workflow_call` which means
# it can ONLY be triggered by another workflow using `uses:`.
# It cannot be triggered by a push, PR, or manual dispatch.
#
# Notice: inputs and secrets must be explicitly declared here
# before they can be used inside the workflow.

name: Reusable - Deploy

on:
  workflow_call:
    # Declare inputs this workflow accepts
    inputs:
      environment:
        description: 'Target environment (staging or production)'
        required: true
        type: string
      version:
        description: 'Version to deploy'
        required: false
        type: string
        default: 'latest'

    # Declare secrets this workflow needs (caller must pass these)
    secrets:
      API_TOKEN:
        description: 'API token for deployment'
        required: false

    # Declare outputs this workflow exposes back to the caller
    outputs:
      deploy-url:
        description: 'URL where the app was deployed'
        value: ${{ jobs.deploy.outputs.url }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.set-url.outputs.url }}

    steps:
      - name: Show what we received
        run: |
          echo "Deploying to: ${{ inputs.environment }}"
          echo "Version: ${{ inputs.version }}"
          echo "Token provided: ${{ secrets.API_TOKEN != '' }}"

      - name: Simulate deployment
        run: |
          echo "🚀 Deploying version ${{ inputs.version }} to ${{ inputs.environment }}..."
          sleep 2
          echo "✅ Deployment complete"

      - name: Set output URL
        id: set-url
        run: |
          URL="https://${{ inputs.environment }}.myapp.com"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"
